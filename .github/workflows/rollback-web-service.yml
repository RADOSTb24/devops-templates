name: Rollback Web Service Component

on:
  workflow_call:
    inputs:
      prod_branch:
        description: "Production branch name for deployment trigger"
        required: false
        default: "main"
        type: string

      dev_branch:
        description: "Development branch name for deployment trigger"
        required: false
        default: "develop"
        type: string

      component_name:
        description: "Component logical name"
        required: true
        type: string

      deploy_mode:
        description: "Deployment mode: ssh or kubernetes"
        required: true
        type: string

      image_name:
        description: "Image name without registry, for example masterhubmd/backend"
        required: true
        type: string

      container_name:
        description: "Container name for SSH rollback"
        required: true
        type: string

      container_env_vars:
        description: "Optional extra docker run env arguments"
        required: false
        default: ""
        type: string

      container_network:
        description: "Optional Docker network name for SSH rollback (e.g., shared-net)"
        required: false
        default: ""
        type: string

      container_volumes:
        description: "Optional volume mounts for SSH rollback, space-separated (e.g., -v /host:/container)"
        required: false
        default: ""
        type: string

      app_port:
        description: "Container port"
        required: true
        type: string

      host_port:
        description: "Host port for SSH rollback"
        required: false
        default: ""
        type: string

      release_name:
        description: "Helm release name for Kubernetes rollback"
        required: true
        type: string

      namespace_prod:
        description: "Production namespace"
        required: false
        default: "default"
        type: string

      namespace_dev:
        description: "Development namespace"
        required: false
        default: "default-dev"
        type: string

      stable_tag_prod:
        description: "Stable image tag for production"
        required: false
        default: "production"
        type: string

      stable_tag_dev:
        description: "Stable image tag for development"
        required: false
        default: "development"
        type: string

      verify_rollout_name:
        description: "Deployment name for rollout verification"
        required: false
        default: ""
        type: string

      revision:
        description: "Optional Helm revision to rollback to"
        required: false
        default: ""
        type: string

    secrets:
      GHCR_USERNAME:
        required: false
      GHCR_PAT:
        required: false

      SSH_HOST:
        required: false
      SSH_USER:
        required: false
      SSH_PRIVATE_KEY:
        required: false
      SSH_PORT:
        required: false

      CLOUDFLEET_ACCESS_TOKEN_ID:
        required: false
      CLOUDFLEET_ACCESS_TOKEN_SECRET:
        required: false
      CLOUDFLEET_ORGANIZATION_ID:
        required: false
      CLOUDFLEET_CLUSTER_ID:
        required: false

concurrency:
  group: rollback-${{ inputs.component_name }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.vars.outputs.environment }}
      namespace: ${{ steps.vars.outputs.namespace }}
      stable_tag: ${{ steps.vars.outputs.stable_tag }}
      stable_image_ref: ${{ steps.vars.outputs.stable_image_ref }}
    steps:
      - id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ inputs.deploy_mode }}" != "ssh" && "${{ inputs.deploy_mode }}" != "kubernetes" ]]; then
            echo "Invalid deploy_mode"
            exit 1
          fi

          if [ "${GITHUB_REF_NAME}" = "${{ inputs.prod_branch }}" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "namespace=${{ inputs.namespace_prod }}" >> "$GITHUB_OUTPUT"
            echo "stable_tag=${{ inputs.stable_tag_prod }}" >> "$GITHUB_OUTPUT"
            echo "stable_image_ref=${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ inputs.stable_tag_prod }}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "${{ inputs.dev_branch }}" ]; then
            echo "environment=development" >> "$GITHUB_OUTPUT"
            echo "namespace=${{ inputs.namespace_dev }}" >> "$GITHUB_OUTPUT"
            echo "stable_tag=${{ inputs.stable_tag_dev }}" >> "$GITHUB_OUTPUT"
            echo "stable_image_ref=${{ env.REGISTRY }}/${{ inputs.image_name }}:${{ inputs.stable_tag_dev }}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

  rollback-on-ssh:
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy_mode == 'ssh' }}
    needs: prepare
    environment: ${{ needs.prepare.outputs.environment }}

    steps:
      - name: Check required SSH and GHCR secrets
        shell: bash
        run: |
          set -e
          [ -n "${{ secrets.SSH_HOST }}" ] || { echo "SSH_HOST is required"; exit 1; }
          [ -n "${{ secrets.SSH_USER }}" ] || { echo "SSH_USER is required"; exit 1; }
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] || { echo "SSH_PRIVATE_KEY is required"; exit 1; }
          [ -n "${{ secrets.SSH_PORT }}" ] || { echo "SSH_PORT is required"; exit 1; }
          [ -n "${{ secrets.GHCR_USERNAME }}" ] || { echo "GHCR_USERNAME is required"; exit 1; }
          [ -n "${{ secrets.GHCR_PAT }}" ] || { echo "GHCR_PAT is required"; exit 1; }

      - name: Rollback container over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REF: ${{ needs.prepare.outputs.stable_image_ref }}
          CONTAINER_NAME: ${{ inputs.container_name }}
          APP_PORT: ${{ inputs.app_port }}
          HOST_PORT: ${{ inputs.host_port }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_REF,CONTAINER_NAME,APP_PORT,HOST_PORT,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            for i in {1..3}; do
              docker pull "$IMAGE_REF" && break || sleep 5
            done

            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

            NETWORK_ARG=""
            if [ -n "${{ inputs.container_network }}" ]; then
              NETWORK_ARG="--network ${{ inputs.container_network }}"
            fi

            if [ -n "$HOST_PORT" ]; then
              docker run -d \
                --name "$CONTAINER_NAME" \
                ${NETWORK_ARG} \
                --restart unless-stopped \
                -p "${HOST_PORT}:${APP_PORT}" \
                ${{ inputs.container_env_vars }} \
                ${{ inputs.container_volumes }} \
                "$IMAGE_REF"
            else
              docker run -d \
                --name "$CONTAINER_NAME" \
                ${NETWORK_ARG} \
                --restart unless-stopped \
                ${{ inputs.container_env_vars }} \
                ${{ inputs.container_volumes }} \
                "$IMAGE_REF"
            fi

            sleep 5
            docker ps --filter "name=$CONTAINER_NAME" --filter "status=running" | grep "$CONTAINER_NAME"

  rollback-on-k8s:
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy_mode == 'kubernetes' }}
    needs: prepare
    environment: ${{ needs.prepare.outputs.environment }}
    env:
      NAMESPACE: ${{ needs.prepare.outputs.namespace }}
      CLOUDFLEET_ACCESS_TOKEN_ID: ${{ secrets.CLOUDFLEET_ACCESS_TOKEN_ID }}
      CLOUDFLEET_ACCESS_TOKEN_SECRET: ${{ secrets.CLOUDFLEET_ACCESS_TOKEN_SECRET }}
      CLOUDFLEET_ORGANIZATION_ID: ${{ secrets.CLOUDFLEET_ORGANIZATION_ID }}

    steps:
      - name: Check required CLOUDFLEET secrets
        shell: bash
        run: |
          set -e
          [ -n "${{ secrets.CLOUDFLEET_ACCESS_TOKEN_ID }}" ] || { echo "CLOUDFLEET_ACCESS_TOKEN_ID is required"; exit 1; }
          [ -n "${{ secrets.CLOUDFLEET_ACCESS_TOKEN_SECRET }}" ] || { echo "CLOUDFLEET_ACCESS_TOKEN_SECRET is required"; exit 1; }
          [ -n "${{ secrets.CLOUDFLEET_ORGANIZATION_ID }}" ] || { echo "CLOUDFLEET_ORGANIZATION_ID is required"; exit 1; }
          [ -n "${{ secrets.CLOUDFLEET_CLUSTER_ID }}" ] || { echo "CLOUDFLEET_CLUSTER_ID is required"; exit 1; }

      - name: Install Cloudfleet CLI
        env:
          NONINTERACTIVE: 1
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://downloads.cloudfleet.ai/apt/pubkey.gpg | sudo tee /usr/share/keyrings/cloudfleet-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/cloudfleet-archive-keyring.gpg] https://downloads.cloudfleet.ai/apt stable main" | sudo tee /etc/apt/sources.list.d/cloudfleet.list
          sudo apt update
          sudo apt install -y cloudfleet

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          cloudfleet clusters kubeconfig ${{ secrets.CLOUDFLEET_CLUSTER_ID }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Determine rollback revision
        id: rev
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.revision }}" ]; then
            echo "revision=${{ inputs.revision }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREV_REVISION=$(helm history "${{ inputs.release_name }}" -n "${NAMESPACE}" \
            | awk 'NR>2 {print $1}' \
            | tail -n 2 \
            | head -n 1)

          if [ -z "${PREV_REVISION}" ] || [ "${PREV_REVISION}" = "null" ]; then
            echo "No previous Helm revision found for rollback" >&2
            exit 1
          fi

          echo "revision=${PREV_REVISION}" >> "$GITHUB_OUTPUT"

      - name: Rollback Helm release
        shell: bash
        run: |
          set -euo pipefail
          helm rollback "${{ inputs.release_name }}" "${{ steps.rev.outputs.revision }}" --namespace "${NAMESPACE}"

      - name: Verify imagePullSecrets configuration
        if: ${{ inputs.verify_rollout_name != '' }}
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_PULL_SECRETS=$(kubectl get deployment "${{ inputs.verify_rollout_name }}" \
            --namespace "${NAMESPACE}" \
            -o jsonpath='{.spec.template.spec.imagePullSecrets[*].name}')

          echo "Deployment imagePullSecrets: ${IMAGE_PULL_SECRETS}"

          if [[ "${IMAGE_PULL_SECRETS}" != *ghcr-secret* ]]; then
            echo "Deployment '${{ inputs.verify_rollout_name }}' does not reference ghcr-secret"
            exit 1
          fi

      - name: Verify rollout
        if: ${{ inputs.verify_rollout_name != '' }}
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/${{ inputs.verify_rollout_name }} --namespace "${NAMESPACE}" --timeout=180s

          if kubectl get pods -n "${NAMESPACE}" | grep -E 'ImagePullBackOff|ErrImagePull'; then
            echo "Detected image pull errors after rollout"
            exit 1
          fi
{{- if and .Values.postgresql.enabled .Values.postgresql.env }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "web-service.fullname" . }}-postgresql-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "web-service.labels" . | nindent 4 }}
data:
  POSTGRES_DB: {{ .Values.postgresql.env.POSTGRES_DB | quote }}
  POSTGRES_USER: {{ .Values.postgresql.env.POSTGRES_USER | quote }}
  PGDATA: {{ .Values.postgresql.env.PGDATA | quote }}
{{- end }}
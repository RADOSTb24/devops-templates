{{- if and .Values.postgresql.enabled .Values.postgresql.secret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "web-service.fullname" . }}-postgresql-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "web-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgresql.secret.data.POSTGRES_PASSWORD | quote }}
{{- end }}
{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "web-service.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "web-service.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "web-service.fullname" . }}-postgresql
  replicas: {{ .Values.postgresql.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "web-service.name" . }}-postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "web-service.name" . }}-postgresql
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: {{ .Values.postgresql.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "web-service.fullname" . }}-postgresql-config
            - secretRef:
                name: {{ include "web-service.fullname" . }}-postgresql-secret
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
      {{- if .Values.postgresql.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.postgresql.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.tolerations }}
      tolerations:
        {{- toYaml .Values.postgresql.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.affinity }}
      affinity:
        {{- toYaml .Values.postgresql.affinity | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    {{- if .Values.postgresql.persistence.enabled }}
    - metadata:
        name: postgresql-data
      spec:
        accessModes:
          {{- toYaml .Values.postgresql.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size | quote }}
        {{- if .Values.postgresql.persistence.storageClassName }}
        storageClassName: {{ .Values.postgresql.persistence.storageClassName | quote }}
        {{- end }}
    {{- end }}
{{- end }}
nameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io
  image: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

ports:
  - name: http
    containerPort: 80
    protocol: TCP

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 80
  protocol: TCP

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

revisionHistoryLimit: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 25%

readinessProbe:
  enabled: false
  path: /health
  port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

livenessProbe:
  enabled: false
  path: /health
  port: http
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  enabled: false
  path: /health
  port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30

configMap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

env: []

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies: []
    scaleUp:
      stabilizationWindowSeconds: 0
      policies: []
  metrics: []

postgresql:
  enabled: false

  image:
    repository: postgres
    tag: "18"
    pullPolicy: IfNotPresent

  replicaCount: 1

  containerPort: 5432

  service:
    name: postgresql
    port: 5432
    headless: true

  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClassName: ""

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  env:
    POSTGRES_DB: app
    POSTGRES_USER: app
    PGDATA: /var/lib/postgresql/data/pgdata

  secret:
    enabled: true
    data:
      POSTGRES_PASSWORD: "<SET_OUTSIDE_GIT>"

  nodeSelector: {}
  tolerations: []
  affinity: {}
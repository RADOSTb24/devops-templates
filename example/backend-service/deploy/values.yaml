nameOverride: backend

replicaCount: 1

image:
  repository: ghcr.io
  image: example/backend-service
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

ports:
  - name: http
    containerPort: 8080
    protocol: TCP
  - name: metrics
    containerPort: 8081
    protocol: TCP

service:
  enabled: true
  type: ClusterIP
  port: 8080
  targetPort: 8080
  protocol: TCP

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

resources:
  limits:
    cpu: "500m"
    memory: 512Mi
  requests:
    cpu: "200m"
    memory: 256Mi

revisionHistoryLimit: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 25%

readinessProbe:
  enabled: true
  path: /actuator/health/readiness
  port: metrics
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

livenessProbe:
  enabled: true
  path: /actuator/health/liveness
  port: metrics
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  enabled: false
  path: /health
  port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30

configMap:
  enabled: true
  data:
    PORT: "8080"
    METRICS_PORT: "8081"
    APP_ENV: "base"

secret:
  enabled: false
  data: {}

env: []

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies: []
    scaleUp:
      stabilizationWindowSeconds: 0
      policies: []
  metrics: []

postgresql:
  enabled: true

  env:
    POSTGRES_DB: database
    POSTGRES_USER: user
    PGDATA: /var/lib/postgresql/data/pgdata

  secret:
    enabled: true
    data:
      POSTGRES_PASSWORD: "password"

  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"